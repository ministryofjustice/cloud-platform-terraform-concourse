                namespaces=()
                while IFS= read -r ns; do
                  [[ -z "$ns" || "$ns" =~ ^# ]] && continue
                  namespaces+=("$ns")
                done <<< "$namespaces_str"

                failed_namespaces=()

                mkdir -p "${TF_PLUGIN_CACHE_DIR}"

                (
                  aws eks --region eu-west-2 update-kubeconfig --name "$TF_VAR_eks_cluster_name"
                )

                for NAMESPACE in "${namespaces[@]}"; do
                  if ! cloud-platform environment apply \
                    --skip-version-check \
                    --namespace "$NAMESPACE" \
                    --cluster "$PIPELINE_CLUSTER" \
                    --clusterdir "$PIPELINE_CLUSTER_DIR" \
                    --kubecfg "$KUBECONFIG"; then
                    failed_namespaces+=("$NAMESPACE")
                  fi
                done

                if [ ${#failed_namespaces[@]} -ne 0 ]; then
                  echo "----------------------------------------"
                  echo "Failed namespaces:"
                  echo "${failed_namespaces[*]}"
                  echo "----------------------------------------"
                else
                  echo "All namespaces applied successfully."
                fi